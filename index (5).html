<!DOCTYPE html>
<!--Indica el tipo de documento.
Le dice al navegador: “esto es HTML5”
Es importante para que el navegador renderice correctamente  -->

<html lang="en">
<!-- Indica el tipo de documento.
Le dice al navegador: “esto es HTML5”
Es importante para que el navegador renderice correctamente -->

<head>
    <!-- Contiene información sobre la página, pero no visible directamente. -->
    <meta charset="UTF-8">
    <!-- Define la codificación de caracteres.

UTF-8 permite usar:
tildes (á, é, í)
ñ
símbolos -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Hace que la página sea responsive (adaptable a celulares).

width=device-width: se ajusta al ancho del dispositivo
initial-scale=1.0: nivel de zoom inicial -->
    <title>Document</title>
    <!-- Define el título de la pestaña del navegador.
Es lo que ves arriba en la pestaña
También lo usan los buscadores -->
</head>

<body>
 <!--    Aquí va todo el contenido visible de la página.
Ejemplos:
texto
imágenes
botones
videos -->
    
</body>
</html>
